name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  lint-test-build:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d finance_ai_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_NAME: Finance AI Input Pipeline
      ENV: test
      DEBUG: false
      MAX_UPLOAD_SIZE_MB: 50
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/finance_ai_test
      REDIS_URL: redis://localhost:6379/0
      LOCAL_STORAGE_ROOT: /tmp/finance-ai-storage
      LOCAL_INPUT_STORAGE_DIR: /tmp/finance-ai-storage/inputs
      CLASSIFICATION_MODEL_VERSION: rules-v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Run Ruff
        run: uv run ruff check app tests

      - name: Run mypy
        run: uv run mypy app

      - name: Run tests
        run: uv run pytest

      - name: Build Docker image
        run: docker build -t finance-ai-input-pipeline:ci .