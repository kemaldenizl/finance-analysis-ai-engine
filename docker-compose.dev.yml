services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance_ai_api_dev
    env_file:
      - .env
    command: ["uv", "run", "--no-sync", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./local_storage:/storage
    environment:
      LLM_ENABLED: "true"
      LLM_BASE_URL: http://ollama:11434
      LLM_MODEL: qwen2.5:1.5b
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance_ai_worker_dev
    env_file:
      - .env
    command: ["uv", "run", "--no-sync", "celery", "-A", "app.workers.celery_app.celery_app", "worker", "-Q", "stage2", "--loglevel=INFO"]
    volumes:
      - ./app:/app/app
      - ./local_storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: finance_ai_postgres_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_ai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: finance_ai_redis_dev
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: finance_ai_ollama_dev
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 20

  ollama_init:
    image: ollama/ollama:latest
    container_name: finance_ai_ollama_init_dev
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "ollama pull qwen2.5:1.5b"
    restart: "no"

volumes:
  postgres_data_dev:
  redis_data_dev:
  ollama_data: